<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./assets/css/style.css">
    <title>Produtos | Cafeteria</title>
</head>
<body>
    <nav>
        <ul>
            <li><a href="index.html">Início</a></li>
            <li><a href="pedidios.html">Pedidos</a></li>
            <li><a href="produtos.html">Produtos</a></li>
            <li><a href="categorias.html">Categorias</a></li>
        </ul>
    </nav>

    <div class="formulario">
        <h3>Cadastro de Produtos</h3>
        <label for="nome">Nome do Produto</label>
        <input type="text" id="nome" placeholder="Nome do produto">

        <label for="preco">Preço</label>
        <input type="number" id="preco" placeholder="Ex: 5.90" step="0.01" min="0">

        <label for="categoria">Categoria</label>
        <select id="categoria">
            <option value="">Selecione a categoria</option>
        </select>

        <label>
            <input type="checkbox" id="disponivel"> Disponível
        </label>

        <button id="botaoEnviar" class="button button-enviar">Cadastrar</button>
    </div>

    <div id="resposta" class="tabela"></div>

<script src="./assets/js/produtos.js"></script>
</body>
</html>
